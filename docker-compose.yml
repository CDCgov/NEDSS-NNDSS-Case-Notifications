services:
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  case-notification-service:
    build:
      context: .
      dockerfile: case-notification-service/Dockerfile
    ports:
      - "8093:8093"
    environment:
      SPRING_PROFILES_ACTIVE: local
      NBS_DBSERVER: host.docker.internal:1433
      NBS_DBUSER: ${NBS_DBUSER}
      NBS_DBPASSWORD: ${NBS_DBPASSWORD}
      KAFKA_BOOTSTRAP_SERVER: kafka:9092
      CN_AUTH_URI: ${CN_AUTH_URI}
      NND_DE_CLIENT_ID: ${NND_DE_CLIENT_ID}
      NND_DE_SECRET: ${NND_DE_SECRET}
      NND_DE_URL: http://xml-hl7-parser-service:8088/hl7-parser
    depends_on:
      - kafka
      - xml-hl7-parser-service

  data-extraction-service:
    build:
      context: .
      dockerfile: data-extraction-service/Dockerfile
    ports:
      - "8090:8090"
    environment:
      NBS_DBSERVER: host.docker.internal:1433
      NBS_DBUSER: ${NBS_DBUSER}
      NBS_DBPASSWORD: ${NBS_DBPASSWORD}
      KAFKA_BOOTSTRAP_SERVER: kafka:9092
    depends_on:
      - kafka

  xml-hl7-parser-service:
    build:
      context: .
      dockerfile: xml-hl7-parser-service/Dockerfile
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: local
      NBS_DBSERVER: host.docker.internal:1433
      NBS_DBUSER: ${NBS_DBUSER}
      NBS_DBPASSWORD: ${NBS_DBPASSWORD}
      CN_AUTH_URI: ${CN_AUTH_URI}